pre-commit:
  commands:
    backend-lint:
      glob: '*.go'
      run: make lint
    backend-test:
      glob: '*.go'
      run: make test
    web-check:
      glob: '*.{ts,tsx,js,jsx,json,css}'
      run: make web-check
  parallel: true

pre-push:
  commands:
    lint:
      run: make lint
    test:
      run: make test
    gosec:
      run: make gosec
    web-check:
      run: make web-check
  parallel: true
