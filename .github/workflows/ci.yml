name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Type-check web
        run: make web-check

      - name: Build web
        run: make web

      - name: Test backend and plugin
        run: make test

      - name: Build web assets for embedding using local fallback
        env:
          BUILD_WEB_LOCAL: '1'
        run: go run ./cmd/retro-obsidian-publish build web --local

      - name: Build embedded binary
        run: go build -tags embed -o bin/retro-obsidian-publish ./cmd/retro-obsidian-publish

      - name: Build Docker image
        run: docker build -f Dockerfile -t retro-obsidian-publish .
