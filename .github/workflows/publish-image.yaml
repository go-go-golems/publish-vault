name: publish-image

on:
  pull_request:
    paths:
      - .github/workflows/publish-image.yaml
      - Dockerfile
      - go.mod
      - go.sum
      - cmd/**
      - internal/**
      - pkg/**
      - web/**
      - deploy/gitops-targets.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-image.yaml
      - Dockerfile
      - go.mod
      - go.sum
      - cmd/**
      - internal/**
      - pkg/**
      - web/**
      - deploy/gitops-targets.json
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-ssr:
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      image_name: ghcr.io/go-go-golems/publish-vault-ssr
      dockerfile: ./web/ssr.Dockerfile
      build_context: .
      test_command: |
        corepack enable
        corepack prepare pnpm@10.4.1 --activate
        pnpm --dir web install --frozen-lockfile
        pnpm --dir web check
        pnpm --dir web build:all
      go_version_file: go.mod
      push_image: ${{ github.event_name != 'pull_request' }}
      open_gitops_pr: false
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main

  release:
    needs: release-ssr
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      dockerfile: ./Dockerfile
      build_context: .
      test_command: |
        go test ./...
      go_version_file: go.mod
      gitops_target_config: deploy/gitops-targets.json
      push_image: ${{ github.event_name != 'pull_request' }}
      open_gitops_pr: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      gitops_pr_token_source: github_app
      vault_role: retro-obsidian-publish-gitops-pr
      gitops_app_secret_path: kv/data/ci/github/retro-obsidian-publish/gitops-pr-app
      gitops_app_owner: wesen
      gitops_app_repositories: 2026-03-27--hetzner-k3s
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main
