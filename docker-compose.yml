version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ${VAULT_PATH:-./backend/vault-example}:/vault:ro
    environment:
      - VAULT_DIR=/vault
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8080
        - VITE_VAULT_NAME=${VAULT_NAME:-My Vault}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
