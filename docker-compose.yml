version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
        - VITE_VAULT_NAME=${VAULT_NAME:-My Vault}
    ports:
      - "8080:8080"
    volumes:
      - ${VAULT_PATH:-./vault-example}:/vault:ro
    environment:
      - VAULT_DIR=/vault
    command:
      - "serve"
      - "--port"
      - "8080"
      - "--serve-web"
      - "--vault-name"
      - "${VAULT_NAME:-My Vault}"
      - "--page-title"
      - "${PAGE_TITLE:-My Vault}"
      - "--ssr-url"
      - "http://ssr:8089"
    restart: unless-stopped
    depends_on:
      - ssr

  ssr:
    build:
      context: .
      dockerfile: web/ssr.Dockerfile
    environment:
      - SSR_PORT=8089
      - API_BASE=http://app:8080
      - BASE_URL=${BASE_URL:-http://localhost:8080}
    restart: unless-stopped
